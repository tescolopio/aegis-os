name: CI

# Runs on every push to main and every PR.  The aegis conda environment is the
# sole sanctioned Python runtime — no bare pip or venv installs.
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: pytest · ruff · mypy (conda aegis)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        # All steps run inside the conda environment.
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          environment-file: environment.yml
          activate-environment: aegis
          auto-activate-base: false
          # Use mamba for faster solves when available.
          miniforge-variant: Mambaforge
          use-mamba: true

      - name: Install project in editable mode
        run: pip install -e ".[dev]"

      - name: Lint — ruff
        run: ruff check src/ tests/

      - name: Type check — mypy
        run: mypy src/

      - name: Test suite — pytest
        run: |
          pytest \
            --tb=short \
            -q \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
