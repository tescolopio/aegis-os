# Aegis-OS Prometheus Alert Rules
# Loaded by Prometheus via rule_files in prometheus.yml.
# Verified against the running Prometheus container as part of the W-prep-3
# Phase 2 preparation checklist item.

groups:
  - name: aegis_hitl
    rules:
      - alert: aegis_hitl_stuck
        # Fires when a workflow has been in PendingApproval for more than 24 hours.
        # The aegis_workflow_pending_approval_seconds gauge is set by the
        # Watchdog subsystem (src/watchdog/metrics.py) whenever a workflow
        # enters PendingApproval.
        expr: aegis_workflow_pending_approval_seconds > 86400
        for: 1m
        labels:
          severity: critical
          team: watchdog
        annotations:
          summary: "HITL approval workflow stuck for >24 h"
          description: >-
            Workflow {{ $labels.workflow_id }} has been waiting for human
            approval for {{ $value | humanizeDuration }}. Investigate via the
            Temporal UI (http://localhost:18080) and either approve, deny, or
            escalate to an ops_lead.
          runbook: "docs/runbooks/hitl-stuck-approval.md"
          runbook_url: "docs/runbooks/hitl-stuck-approval.md"
