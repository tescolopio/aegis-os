version: "3.9"

services:
  aegis-api:
    build: .
    ports:
      - "18000:8000"
    environment:
      - AEGIS_ENV=development
      - AEGIS_VAULT_ADDR=http://vault:8200
      - AEGIS_TEMPORAL_HOST=temporal:7233
      - AEGIS_OPA_URL=http://opa:8181
    depends_on:
      - vault
      - temporal
      - opa
      - prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  aegis-worker:
    build: .
    command: ["python", "-m", "src.control_plane.worker"]
    environment:
      - AEGIS_ENV=development
      - AEGIS_VAULT_ADDR=http://vault:8200
      - AEGIS_TEMPORAL_HOST=temporal:7233
      - AEGIS_TEMPORAL_TASK_QUEUE=aegis-agent-tasks
      - AEGIS_OPA_URL=http://opa:8181
      - AEGIS_LLM_PROVIDER=local_llama
      - AEGIS_LOCAL_LLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - AEGIS_LOCAL_LLAMA_MODEL=llama3
    depends_on:
      - temporal
      - opa
      - vault
    extra_hosts:
      - "host.docker.internal:host-gateway"

  vault:
    image: hashicorp/vault:1.17
    ports:
      - "8210:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "aegis-dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev

  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
      - "8088:8088"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    depends_on:
      - postgresql

  temporal-ui:
    image: temporalio/ui:2.47.2
    ports:
      - "18080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233

  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    expose:
      - "5432"

  opa:
    image: openpolicyagent/opa:0.68.0
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"

  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "19090:9090"
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./docs/alerts.yml:/etc/prometheus/alerts.yml

  code-scalpel:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    command: ["uvx", "codescalpel", "mcp", "--transport", "sse", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "18090:8080"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=aegis-admin
    depends_on:
      - prometheus
